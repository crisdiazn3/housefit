<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HouseFit Training</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080C10;--bg2:#0D1218;--bg3:#131920;--bg4:#1A2230;--bg5:#212C3A;--bd:rgba(255,255,255,0.06);--bd2:rgba(255,255,255,0.12);--bd3:rgba(255,255,255,0.20);--tx:#E8EFF8;--tx2:#7A92AA;--tx3:#3D5268;--ac:#3DFFA0;--ac2:rgba(61,255,160,0.08);--am:#FFB830;--bl:#3DB8FF;--pu:#9B7BFF;--rd:#FF4D6A;--r:10px;--r2:16px;--r3:24px;}
body.light{--bg:#F0F4F8;--bg2:#FFFFFF;--bg3:#E8EEF4;--bg4:#D4DDE8;--bg5:#C8D4E0;--bd:rgba(0,0,0,0.08);--bd2:rgba(0,0,0,0.14);--bd3:rgba(0,0,0,0.22);--tx:#1A2230;--tx2:#4A6080;--tx3:#8A9AB0;--ac:#00A060;--ac2:rgba(0,160,96,0.1);--am:#B06800;--bl:#1878B8;--pu:#6040B8;--rd:#C01830;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;-webkit-font-smoothing:antialiased;}
input,select,textarea,button{font-family:'Inter',sans-serif;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}
.hidden{display:none!important;}

/* BADGES */
.badge{font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500;white-space:nowrap;}
.bac{background:var(--ac2);color:var(--ac);border:1px solid rgba(61,255,160,.2);}
.bam{background:rgba(255,184,48,.08);color:var(--am);border:1px solid rgba(255,184,48,.2);}
.bbl{background:rgba(61,184,255,.08);color:var(--bl);border:1px solid rgba(61,184,255,.2);}
.bpu{background:rgba(155,123,255,.08);color:var(--pu);border:1px solid rgba(155,123,255,.2);}
.brd{background:rgba(255,77,106,.08);color:var(--rd);border:1px solid rgba(255,77,106,.2);}
.bgr{background:var(--bg3);color:var(--tx2);border:1px solid var(--bd2);}
